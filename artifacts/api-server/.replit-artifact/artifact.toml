kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api", "/cria-v2", "/cria-v4", "/cria-unified", "/ultraria"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
build = ["bash", "-c", "python3 -m pip install -q -r artifacts/cria-unified/requirements.txt && pnpm --filter @workspace/api-server run build"]

[services.production.run]
args = ["bash", "artifacts/api-server/start.sh"]

[services.production.health.startup]
path = "/api/healthz"

[services.env]
PORT = "8080"
