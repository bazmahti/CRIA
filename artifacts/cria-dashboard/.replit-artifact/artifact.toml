kind = "web"
previewPath = "/"
title = "CRIA Dashboard"
version = "1.0.0"
id = "artifacts/cria-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19806

[services.development]
run = "pnpm --filter @workspace/cria-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cria-dashboard", "run", "build" ]
publicDir = "artifacts/cria-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19806"
BASE_PATH = "/"

[[services]]
name = "cria-v2"
paths = [ "/cria-v2" ]
localPort = 8001

[services.development]
run = "python /home/runner/workspace/artifacts/cria-deepseek/main.py"

[services.env]
PORT = "8001"
