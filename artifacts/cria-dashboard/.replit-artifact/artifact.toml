kind = "web"
previewPath = "/"
title = "CRIA Dashboard"
version = "1.0.0"
id = "artifacts/cria-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19806

[services.development]
run = "pnpm --filter @workspace/cria-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cria-dashboard", "run", "build" ]
publicDir = "artifacts/cria-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19806"
BASE_PATH = "/"

[[services]]
name = "cria-v2"
paths = [ "/cria-v2" ]
localPort = 8001

[services.development]
run = "python /home/runner/workspace/artifacts/cria-deepseek/main.py"

[services.env]
PORT = "8001"

[[services]]
name = "cria-v4"
paths = [ "/cria-v4" ]
localPort = 8002

[services.development]
run = "python /home/runner/workspace/artifacts/cria-v4/main.py"

[services.env]
PORT = "8002"

[[services]]
name = "cria-unified"
paths = [ "/cria-unified" ]
localPort = 8003

[services.development]
run = "python /home/runner/workspace/artifacts/cria-unified/main.py"

[services.production]

[services.production.run]
args = ["python", "artifacts/cria-unified/main.py"]

[services.production.health.startup]
path = "/cria-unified/health"

[services.env]
PORT = "8003"
BASE_PATH = "/cria-unified"
ULTRARIA_URL = "http://localhost:8004"

[[services]]
name = "ultraria"
paths = [ "/ultraria" ]
localPort = 8004

[services.development]
run = "python /home/runner/workspace/artifacts/cria-unified/ultraria_stub.py"

[services.env]
PORT = "8004"
ULTRARIA_PORT = "8004"
